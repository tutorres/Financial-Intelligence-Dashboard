folder_structure: |
  financial-intelligence-dashboard/
  ├── data/
  │   ├── bronze/
  │   ├── silver/
  │   └── gold/
  ├── pipeline/
  │   ├── ingest.py
  │   ├── transform.py
  │   └── aggregate.py
  ├── ml/
  │   ├── dataset.py
  │   ├── model.py
  │   ├── train.py
  │   └── predict.py
  ├── chat/
  │   └── agent.py
  ├── dashboard/
  │   └── app.py
  ├── context.yaml
  ├── requirements.txt
  └── README.md

conventions:
  language: Python 3.11+
  style: PEP8, type hints encouraged
  commits: conventional commits (feat:, fix:, data:, ml:, docs:)
  branching: main (stable) + feature branches
  secrets: never hardcode API keys — use .env + python-dotenv